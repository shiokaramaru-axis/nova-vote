<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ミューコミVR XIDEN NOVA投票サイト</title>

<style>

body{

    margin:0;

    padding:30px;

    background:#ffffff;

    font-family:"Yu Gothic",sans-serif;

}

.container{

    max-width:600px;

    margin:auto;

    text-align:center;

}

h1{

    color:#7B2CBF;

    font-size:34px;

    margin-bottom:50px;

    line-height:1.5;

}

button{

    width:100%;

    padding:22px;

    font-size:22px;

    border:none;

    border-radius:14px;

    cursor:pointer;

    margin-bottom:25px;

    transition:.15s;

    color:white;

    font-weight:bold;

}

button:active{

    transform:translateY(4px);

}

.post{

    background:#8E44AD;

}

.post:hover{

    background:#7D3C98;

}

.dm{

    background:#3498DB;

}

.dm:hover{

    background:#2E86C1;

}

.note{

    margin-top:40px;

    color:#666;

    font-size:18px;

    line-height:1.8;

}

.message{

    margin-top:25px;

    color:#16A085;

    font-weight:bold;

    font-size:18px;

}

@media(max-width:600px){

h1{

font-size:28px;

}

button{

font-size:20px;

padding:18px;

}

.note{

font-size:16px;

}

}

</style>

</head>

<body>

<div class="container">

<h1>

ミューコミVR<br>

XIDEN NOVA投票サイト

</h1>

<button class="post" id="postButton">

Xのポストで投票

</button>

<button class="dm" id="dmButton">

XのDMで投票

</button>

<p class="note">

※DM画面を開いたのち、貼り付けボタンを押して送信してください。<br>

（投票文は自動でコピーされています）

</p>

<div id="message" class="message"></div>

<script>
const voteText = `(XIDEN)の『NOVA』に投票します！

#VTuber楽曲ランキング #ミューコミVR`;

const tweetUrl =
"https://x.com/intent/tweet?text=" + encodeURIComponent(voteText);

const dmUrl =
"https://x.com/messages/compose?recipient_id=100786821";

const message =
document.getElementById("message");

document.getElementById("postButton").addEventListener("click", () => {

    window.open(tweetUrl, "_blank");

});

document.getElementById("dmButton").addEventListener("click", async () => {

    try{

        await navigator.clipboard.writeText(voteText);

        message.innerHTML =
        "✔ 投票文をコピーしました！<br>DM画面で貼り付けて送信してください。";

    }

    catch{

        message.innerHTML =
        "コピーに失敗しました。手動でコピーしてください。";

    }

    setTimeout(()=>{

        window.open(dmUrl,"_blank");

    },300);

});

</script>

</body>

</html>
